<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studiu</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="app-page">
  <main class="app-shell">
    <header class="app-header">
      <div class="app-header-row">
        <a class="btn-back" id="backLink" href="index.html">Înapoi</a>
        <span class="app-kicker">Recapitulare completă</span>
      </div>
      <h1 class="page-title" id="title">Mod Studiu</h1>
      <p class="app-subtitle">Parcurge toate întrebările cu răspunsurile corecte evidențiate.</p>
    </header>

    <section class="study-intro">
      <h3>Progres de citire</h3>
      <p>Întrebările sunt marcate ca vizualizate pe măsură ce le parcurgi.</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div id="progressText" class="stats">Progres: 0 din 0 întrebări vizualizate</div>
    </section>

    <section id="questionsRoot"></section>
    <div id="donation"></div>
  </main>

  <button class="nav-toggle" id="navToggle" title="Navigare studiu">
    Navigare
  </button>

  <div class="nav-overlay" id="navOverlay">
    <div class="nav-panel" id="navPanel">
      <div class="nav-panel-header">
        <h3>Navigare studiu</h3>
        <button class="nav-close" id="navClose" aria-label="Închide">×</button>
      </div>

      <div class="quick-jump-actions" aria-label="Scurtături în pagină">
        <button type="button" class="quick-jump-btn" data-jump="top">Sus</button>
        <button type="button" class="quick-jump-btn" data-jump="middle">Mijloc</button>
        <button type="button" class="quick-jump-btn" data-jump="bottom">Jos</button>
      </div>

      <input type="text" class="nav-search" id="navSearch" placeholder="Lipește text din întrebare sau caută un cuvânt">

      <ul class="nav-list" id="navList"></ul>
    </div>
  </div>

  <script src="assets/common.js"></script>
  <script>
    let questions = [];
    let seen = new Set();

    async function init() {
      let subjectId = AppUtils.getParam("subject") || localStorage.getItem("lastSubjectId");
      const backEl = document.getElementById("backLink");

      if (subjectId) {
        localStorage.setItem("lastSubjectId", subjectId);
        backEl.href = `subject.html?subject=${encodeURIComponent(subjectId)}`;
      } else {
        backEl.href = "#";
        backEl.addEventListener("click", (e) => {
          e.preventDefault();
          if (history.length > 1) history.back();
          else location.href = "index.html";
        });
        throw new Error("Lipsește parametrul ?subject= și nu există ultima materie.");
      }

      const sData = await AppUtils.fetchJSON("data/subjects.json");

      const subject = (sData.subjects || []).find(s => s.id === subjectId);
      if (!subject) throw new Error("Materia nu există în subjects.json: " + subjectId);

      document.title = `Studiu — ${subject.title}`;
      document.getElementById("title").textContent = `Mod Studiu — ${subject.title}`;
      AppUtils.saveLastSession(subjectId, subject.title, "Studiu", `study.html?subject=${encodeURIComponent(subjectId)}`);

      const rawQ = await AppUtils.fetchJSON(subject.questionsFile);

      questions = AppUtils.normalizeQuestions(rawQ);
      if (!questions.length) throw new Error("Fișierul de întrebări e gol sau format greșit.");

      const root = document.getElementById("questionsRoot");
      root.innerHTML = "";

      questions.forEach((q, idx) => {
        const card = document.createElement("div");
        card.className = "question-study";
        card.dataset.index = String(idx);
        card.id = `question-${idx}`;

        const h = document.createElement("h3");
        h.textContent = `${idx + 1}. ${q.text}`;
        card.appendChild(h);

        const ul = document.createElement("ul");
        ul.className = "options-study";

        q.answers.forEach((ans, i) => {
          const li = document.createElement("li");
          li.textContent = ans;
          if (i === q.correctIndex) li.classList.add("correct");
          ul.appendChild(li);
        });

        card.appendChild(ul);
        root.appendChild(card);
      });

      const fill = document.getElementById("progressFill");
      const txt = document.getElementById("progressText");

      function updateProgress() {
        const total = questions.length;
        const viewed = seen.size;
        const pct = total ? Math.round((viewed / total) * 100) : 0;
        fill.style.width = pct + "%";
        txt.textContent = `Progres: ${viewed} din ${total} întrebări vizualizate`;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            seen.add(e.target.dataset.index);
            updateProgress();
          }
        });
      }, { threshold: 0.6 });

      document.querySelectorAll(".question-study").forEach(el => observer.observe(el));
      updateProgress();
      initQuickNav();
    }

    function initQuickNav() {
      const toggle = document.getElementById("navToggle");
      const overlay = document.getElementById("navOverlay");
      const closeBtn = document.getElementById("navClose");
      const searchInput = document.getElementById("navSearch");

      toggle.addEventListener("click", () => {
        overlay.classList.add("active");
        searchInput.value = "";
        renderNavList();
        setTimeout(() => searchInput.focus(), 180);
      });

      function closePanel() {
        overlay.classList.remove("active");
      }

      closeBtn.addEventListener("click", closePanel);

      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) closePanel();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && overlay.classList.contains("active")) {
          closePanel();
        }
      });

      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.trim();
        renderNavList(query);
      });

      document.querySelectorAll(".quick-jump-btn").forEach((button) => {
        button.addEventListener("click", () => {
          jumpToStudyPosition(button.dataset.jump);
          closePanel();
        });
      });
    }

    function jumpToStudyPosition(position) {
      if (position === "top") {
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      if (position === "bottom") {
        window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
        return;
      }

      const middleIndex = Math.max(0, Math.floor(questions.length / 2) - 1);
      scrollToQuestion(middleIndex);
    }

    function renderNavList(query = "") {
      const navList = document.getElementById("navList");
      const normalizedQuery = normalizeSearchText(query);

      let filteredQuestions = questions.map((q, idx) => ({
        ...q,
        idx,
        matchScore: normalizedQuery.length >= 2 ? scoreQuestionMatch(normalizedQuery, q.text) : 0
      }));

      if (normalizedQuery.length >= 2) {
        filteredQuestions = filteredQuestions
          .filter(q => q.matchScore > 0)
          .sort((a, b) => b.matchScore - a.matchScore)
          .slice(0, 12);
      }

      if (filteredQuestions.length === 0) {
        navList.innerHTML = `<li class="nav-no-results">Nu am găsit o potrivire clară. Încearcă mai mult text din întrebare.</li>`;
        return;
      }

      navList.innerHTML = filteredQuestions.map(q => {
        const isViewed = seen.has(String(q.idx));
        const displayText = normalizedQuery.length >= 2
          ? highlightText(q.text, query)
          : truncateText(q.text, 80);
        const correctAnswer = q.answers[q.correctIndex] || "Răspuns indisponibil";
        const matchBadge = normalizedQuery.length >= 2
          ? `<span class="match-score">${Math.round(q.matchScore)}% potrivire</span>`
          : "";

        return `
          <li class="nav-list-item ${isViewed ? "viewed" : ""}" data-index="${q.idx}">
            <span class="nav-item-num">${q.idx + 1}</span>
            <span class="nav-item-body">
              <span class="nav-item-text">${displayText}</span>
              <span class="nav-answer">Răspuns corect: <strong>${correctAnswer}</strong></span>
              ${matchBadge}
            </span>
          </li>
        `;
      }).join("");

      navList.querySelectorAll(".nav-list-item").forEach(item => {
        item.addEventListener("click", () => {
          const idx = parseInt(item.dataset.index, 10);
          scrollToQuestion(idx);
          document.getElementById("navOverlay").classList.remove("active");
        });
      });
    }

    function normalizeSearchText(text) {
      return text
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9ăâîșț\s]/gi, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function scoreQuestionMatch(normalizedQuery, questionText) {
      const normalizedQuestion = normalizeSearchText(questionText);
      if (!normalizedQuery || !normalizedQuestion) return 0;
      if (normalizedQuestion.includes(normalizedQuery)) return 100;

      const queryTokens = normalizedQuery
        .split(" ")
        .filter(token => token.length >= 3);

      if (!queryTokens.length) return 0;

      const questionTokens = new Set(
        normalizedQuestion
          .split(" ")
          .filter(token => token.length >= 3)
      );

      const matched = queryTokens.filter(token => questionTokens.has(token)).length;
      const tokenScore = (matched / queryTokens.length) * 88;
      const lengthBonus = Math.min(12, normalizedQuery.length / 12);
      return Math.round(tokenScore + lengthBonus);
    }

    function scrollToQuestion(idx) {
      const element = document.getElementById(`question-${idx}`);
      if (element) {
        element.scrollIntoView({ behavior: "smooth", block: "start" });
        element.style.boxShadow = "0 0 0 3px rgba(24, 79, 144, 0.25)";
        setTimeout(() => {
          element.style.boxShadow = "";
        }, 1600);
      }
    }

    function truncateText(text, maxLength) {
      if (text.length <= maxLength) return text;
      return text.substring(0, maxLength).trim() + "...";
    }

    function highlightText(text, query) {
      const regex = new RegExp(`(${escapeRegex(query)})`, "gi");
      const highlighted = text.replace(regex, "<mark>$1</mark>");
      return truncateText(highlighted, 120);
    }

    function escapeRegex(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    init().catch(err => {
      console.error(err);
      document.getElementById("questionsRoot").innerHTML =
        `<div class="error-state">${err.message}</div>`;
    });
  </script>
  <script src="assets/donation.js"></script>
</body>
</html>
