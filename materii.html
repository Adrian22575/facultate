<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materii - Teste Facultate</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="app-page">
  <main class="app-shell">
    <header class="app-header">
      <div class="app-header-row">
        <a href="index.html" class="btn-back">Înapoi la meniu</a>
        <span class="app-kicker">17 materii</span>
      </div>
      <h1 class="page-title">Teste pe materii</h1>
      <p class="app-subtitle">Caută materia și intră în modul de lucru potrivit.</p>
    </header>

    <section class="surface">
      <div class="toolbar">
        <input id="subjectSearch" class="input-search" type="search" placeholder="Caută materia..." autocomplete="off">
        <span id="subjectCount" class="subject-count">Se încarcă...</span>
      </div>

      <ul class="action-list" id="subjectsList"></ul>
    </section>
  </main>

  <script src="assets/common.js"></script>
  <script>
    let allSubjects = [];

    function renderSubjects(subjects) {
      const list = document.getElementById("subjectsList");
      const count = document.getElementById("subjectCount");
      list.innerHTML = "";
      count.textContent = `${subjects.length} materii afișate`;

      if (!subjects.length) {
        list.innerHTML = `<li class="empty-state">Nu am găsit rezultate pentru căutarea ta.</li>`;
        return;
      }

      subjects.forEach(s => {
        const li = document.createElement("li");
        li.innerHTML = `
          <a class="test-link" href="subject.html?subject=${encodeURIComponent(s.id)}">
            ${s.title}
            <span>Deschide modurile de învățare</span>
          </a>
        `;
        list.appendChild(li);
      });
    }

    async function loadSubjects() {
      const data = await AppUtils.fetchJSON("data/subjects.json");
      allSubjects = [...(data.subjects || [])].sort((a, b) => a.title.localeCompare(b.title, "ro"));
      renderSubjects(allSubjects);

      document.getElementById("subjectSearch").addEventListener("input", (event) => {
        const term = event.target.value.trim().toLowerCase();
        const filtered = allSubjects.filter((subject) => subject.title.toLowerCase().includes(term));
        renderSubjects(filtered);
      });
    }

    loadSubjects().catch(err => {
      console.error(err);
      document.getElementById("subjectsList").innerHTML =
        `<li class="error-state">Eroare la încărcarea materiilor. Verifică data/subjects.json.</li>`;
      document.getElementById("subjectCount").textContent = "Eroare la încărcare";
    });
  </script>
</body>
</html>
