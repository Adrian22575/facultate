<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materia</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="app-page">
  <main class="app-shell">
    <header class="app-header">
      <div class="app-header-row">
        <a class="btn-back" href="materii.html">Înapoi la materii</a>
        <span class="app-kicker">Alege modul</span>
      </div>
      <h1 class="page-title" id="pageTitle">Materia</h1>
      <p class="app-subtitle">Alege cum vrei să lucrezi materia acum.</p>
    </header>

    <section class="surface">
      <div class="mode-grid" id="modeLinks" aria-label="Moduri disponibile"></div>
      <div id="donation"></div>
    </section>
  </main>

  <script src="assets/common.js"></script>
  <script>
    async function init() {
      const subjectId = AppUtils.getParam("subject");
      if (!subjectId) throw new Error("Lipsește parametrul ?subject=");

      localStorage.setItem("lastSubjectId", subjectId);

      const data = await AppUtils.fetchJSON("data/subjects.json");
      const subject = (data.subjects || []).find(s => s.id === subjectId);
      if (!subject) throw new Error("Materia nu există în subjects.json: " + subjectId);

      document.title = subject.title;
      document.getElementById("pageTitle").textContent = subject.title;
      AppUtils.saveLastSession(subjectId, subject.title, "Alege modul", `subject.html?subject=${encodeURIComponent(subjectId)}`);

      const q = encodeURIComponent(subjectId);
      document.getElementById("modeLinks").innerHTML = `
        <a class="mode-card mode-card-link primary" href="interactive.html?subject=${q}">
          <h3>Interactiv</h3>
          <p>Întrebări una câte una, cu feedback imediat.</p>
        </a>
        <a class="mode-card mode-card-link" href="study.html?subject=${q}">
          <h3>Studiază</h3>
          <p>Toate întrebările și răspunsurile corecte la vedere.</p>
        </a>
        <a class="mode-card mode-card-link" href="test.html?subject=${q}">
          <h3>Test</h3>
          <p>Alegi numărul de întrebări și primești scor final.</p>
        </a>
      `;
    }

    init().catch(err => {
      console.error(err);
      document.getElementById("pageTitle").textContent = "Eroare";
      document.getElementById("modeLinks").innerHTML =
        `<div class="error-state">${err.message}</div>`;
    });
  </script>
  <script src="assets/donation.js"></script>
</body>
</html>
