<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materia</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="container">
    <a class="btn-back" href="index.html">Înapoi la meniu</a>

    <h1 id="pageTitle">Materia</h1>
    <p class="description" style="text-align:center;">Alege modul:</p>

    <div class="mode-grid" aria-label="Descriere moduri">
      <div class="mode-card">
        <h3>🧩 Modul Interactiv</h3>
        <p>Parcurgi întrebările una câte una și primești feedback instant.</p>
      </div>
      <div class="mode-card">
        <h3>📖 Studiază</h3>
        <p>Vezi toate întrebările și răspunsurile corecte într-un format de recapitulare.</p>
      </div>
      <div class="mode-card">
        <h3>🎯 Test</h3>
        <p>Configurezi numărul de întrebări și dificultatea, apoi vezi scorul final.</p>
      </div>
    </div>

    <div class="menu-buttons" id="modeLinks"></div>
    <div id="donation"></div>
  </div>

  <script src="assets/common.js"></script>
  <script>
    async function init() {
      const subjectId = AppUtils.getParam("subject");
      if (!subjectId) throw new Error("Lipsește parametrul ?subject=");

      // reține ultima materie (util pentru back)
      localStorage.setItem("lastSubjectId", subjectId);

      const data = await AppUtils.fetchJSON("data/subjects.json");
      const subject = (data.subjects || []).find(s => s.id === subjectId);
      if (!subject) throw new Error("Materia nu există în subjects.json: " + subjectId);

      document.title = subject.title;
      document.getElementById("pageTitle").textContent = subject.title;

      const q = encodeURIComponent(subjectId);
      document.getElementById("modeLinks").innerHTML = `
        <a class="test-link" href="interactive.html?subject=${q}">🧩 Modul Interactiv</a>
        <a class="test-link" href="study.html?subject=${q}">📖 Studiază</a>
        <a class="test-link" href="test.html?subject=${q}">🎯 Test</a>
      `;
    }

    init().catch(err => {
      console.error(err);
      document.getElementById("pageTitle").textContent = "Eroare";
      document.getElementById("modeLinks").innerHTML =
        `<div style="color:#b00020; text-align:center; font-weight:700;">${err.message}</div>`;
    });
  </script>
  <script src="assets/donation.js"></script>
</body>
</html>
